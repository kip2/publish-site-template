name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    # テンプレートリポジトリ自身ではデプロイを動かさない。
    # 「Use this template」で派生したリポジトリでは is_template が false になるため通常通り動く。
    if: ${{ !github.event.repository.is_template }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch Quartz framework
        run: ./bootstrap.sh --ci

      - name: Install Dependencies
        run: npm ci

      - name: Build Quartz
        env:
          # baseUrl は github コンテキストから自動派生（secret 不要）
          QUARTZ_BASE_URL: "${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          # page title は repo 変数で上書き可能、未設定時はリポジトリ名
          QUARTZ_PAGE_TITLE: ${{ vars.QUARTZ_PAGE_TITLE || github.event.repository.name }}
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: ${{ !github.event.repository.is_template }}
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
